version: 2

project_name: {{project-name}}

builds:
  - binary: '{{ .ProjectName }}'
    env:
      - CGO_ENABLED=0
    tags:
      - osusergo
      - netgo
    ldflags:
      - '-s'
      - '-w'
      - '-X {{module-path}}/internal/buildinfo.version={{ .Version }}'
      - '-X {{module-path}}/internal/buildinfo.commit={{ .Commit }}'
      - '-X {{module-path}}/internal/buildinfo.date={{ .Date }}'
    goos:
      - linux

upx:
  - enabled: true
    goos: [linux]
    compress: best
    lzma: true

archives:
  - name_template: '{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}'
    files:
      - LICENSE.txt

nfpms:
  - file_name_template: '{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}'
    maintainer: Florian Hübner <fhuebner@posteo.de>
    homepage: https://{{git-host}}/{{git-owner}}/{{project-name}}
    license: MIT
    formats:
      - apk
      - deb
      - rpm
      - archlinux
    bindir: /usr/local/bin

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

changelog:
  sort: asc

release:
  draft: true
  replace_existing_draft: true
  name_template: 'v{{ .Version }}'
  header: 'Release generated at commit: {{ .ShortCommit }}'
