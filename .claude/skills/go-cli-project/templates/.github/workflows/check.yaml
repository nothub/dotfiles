name: '🕵️'

on: [push, pull_request]

jobs:
  check:
    runs-on: ubuntu-24.04
    steps:

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          check-latest: true
          cache: true

      - run: go test -v -vet 'all' ./...
